<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>جسر مقيم - Muqeem Bridge</title>
<style>
  body { font-family: -apple-system, "Segoe UI", Tajawal, sans-serif; background: #111; color: #ddd; margin: 0; padding: 24px; }
  h1 { font-size: 16px; margin: 0 0 12px; color: #f59e0b; }
  p { font-size: 13px; margin: 6px 0; opacity: 0.8; }
  #log { margin-top: 16px; padding: 12px; background: #1a1a1a; border-radius: 8px; max-height: 60vh; overflow: auto; font: 11px/1.6 ui-monospace, monospace; }
  .ok { color: #22c55e; } .err { color: #ef4444; }
</style>
</head>
<body>
  <h1>جسر مقيم — Bridge جاهز</h1>
  <p>لا تغلق هذا التبويب أثناء عمل المزامنة.</p>
  <p>Don't close this tab while sync is running.</p>
  <div id="log"></div>
<script>
// This page is opened by the Muqeem sync bookmarklet to bypass muqeem.sa's
// strict CSP (which blocks supabase.co). The bookmarklet collects data on
// muqeem.sa, then sends each Supabase REST call here via postMessage. We
// run on the Jisr origin so we can talk to Supabase directly.

const SUPABASE_URL = 'https://gcvshzutdslmdkwqwteh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjdnNoenV0ZHNsbWRrd3F3dGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTkwNjgsImV4cCI6MjA5MDQ3NTA2OH0.5R0I5VvB7lp3wpSrtay3DMcXKsT9l1uK0Ukd1F4_ImM';

const logEl = document.getElementById('log');
const log = (text, cls) => {
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = new Date().toLocaleTimeString('en-GB') + '  ' + text;
  logEl.prepend(div);
};

window.addEventListener('message', async (e) => {
  const req = e.data;
  if (!req || typeof req !== 'object') return;
  // The opener identifies itself via a {hello:true} ping — ack with ready
  // so the bookmarklet can stop waiting.
  if (req.hello) {
    log('✓ handshake from ' + (e.origin || 'opener'));
    e.source.postMessage({ ready: true }, '*');
    return;
  }
  const { id, path, method, headers, body } = req;
  if (!id || !path) return;
  let status = 0, text = '';
  try {
    const r = await fetch(SUPABASE_URL + path, {
      method: method || 'POST',
      headers: Object.assign({
        apikey: SUPABASE_ANON,
        Authorization: 'Bearer ' + SUPABASE_ANON,
        'Content-Type': 'application/json',
      }, headers || {}),
      body: body == null ? null : (typeof body === 'string' ? body : JSON.stringify(body)),
    });
    status = r.status;
    text = await r.text();
    log((status >= 200 && status < 300 ? '✓ ' : '✗ ') + status + ' ' + (method || 'POST') + ' ' + path, status >= 200 && status < 300 ? 'ok' : 'err');
  } catch (err) {
    status = 0;
    text = String(err && err.message || err);
    log('✗ network error: ' + text + ' (' + path + ')', 'err');
  }
  e.source.postMessage({ id, status, body: text }, '*');
});

// Announce ourselves to the opener in case it's already waiting.
if (window.opener) {
  try { window.opener.postMessage({ ready: true, source: 'muqeem-bridge' }, '*'); } catch (_) {}
  log('opened by bookmarklet — ready to receive requests');
} else {
  log('no opener — open via Jisr Muqeem sync bookmarklet');
}
</script>
</body>
</html>
