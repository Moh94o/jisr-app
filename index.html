<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="جسر" />
    <meta name="application-name" content="جسر" />
    <meta name="theme-color" content="#171717" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf8f3" media="(prefers-color-scheme: light)" />
    <meta name="msapplication-TileColor" content="#171717" />
    <meta name="msapplication-navbutton-color" content="#171717" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 40'%3E%3Cpath d='M6 36 C6 16 18 4 30 4 C42 4 54 16 54 36' stroke='%23D4A017' stroke-width='3' fill='none'/%3E%3Cline x1='18' y1='36' x2='18' y2='22' stroke='%23D4A017' stroke-width='2'/%3E%3Cline x1='30' y1='36' x2='30' y2='4' stroke='%23D4A017' stroke-width='2'/%3E%3Cline x1='42' y1='36' x2='42' y2='22' stroke='%23D4A017' stroke-width='2'/%3E%3Cline x1='4' y1='36' x2='56' y2='36' stroke='%23D4A017' stroke-width='2.5'/%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    
    <!-- iOS Splash Screen -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" />
    
    <title>جسر للأعمال | Jisr Business</title>
    
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
      }
      body {
        background: #171717;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      @supports (padding: env(safe-area-inset-top)) {
        body {
          padding-top: env(safe-area-inset-top);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }
      * {
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-overflow-scrolling: touch;
      }
      input, textarea, select, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }
      /* ═══ Dark theme: dropdowns, dates, inputs ═══ */
      select, input[type="date"], input[type="time"], input[type="datetime-local"], input[type="month"], input[type="week"] {
        color-scheme: dark;
      }
      select {
        background-color: rgba(255,255,255,.04) !important;
        color: rgba(255,255,255,.85) !important;
      }
      select option {
        background: #1e1e1e;
        color: rgba(255,255,255,.85);
        padding: 8px 12px;
      }
      input, textarea, select {
        border: 1px solid transparent !important;
        transition: border-color .18s;
      }
      select:focus, input:focus, textarea:focus {
        outline: none;
      }
      /* Gold focus ring on search boxes (placeholder starting with "ابحث")
         — applied while focused and while they hold user input. The :has()
         rule pulls the preceding search icon into the gold state too. */
      input[placeholder^="ابحث"]:focus:not(.occ-sel-search),
      input[placeholder^="ابحث"]:not(:placeholder-shown):not(.occ-sel-search) {
        border: 1px solid rgba(212,160,23,.55) !important;
        box-shadow: 0 0 0 1px rgba(212,160,23,.18), inset 0 1px 2px rgba(0,0,0,.2) !important;
      }
      div:has(> input[placeholder^="ابحث"]:focus:not(.occ-sel-search)) > svg,
      div:has(> input[placeholder^="ابحث"]:not(:placeholder-shown):not(.occ-sel-search)) > svg {
        stroke: #D4A017 !important;
        color: #D4A017 !important;
      }
      input[type="date"]::-webkit-calendar-picker-indicator,
      input[type="time"]::-webkit-calendar-picker-indicator,
      input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        filter: invert(0.7) sepia(1) saturate(3) hue-rotate(15deg);
        cursor: pointer;
        opacity: 0.6;
      }
      input[type="date"]::-webkit-calendar-picker-indicator:hover,
      input[type="time"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }
      /* Scrollbar for dropdowns */
      select::-webkit-scrollbar { width: 6px; }
      select::-webkit-scrollbar-track { background: #1e1e1e; }
      select::-webkit-scrollbar-thumb { background: rgba(201,168,76,.3); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
        document.documentElement.classList.add('pwa-standalone');
      }
      document.addEventListener('touchmove', function(e) {
        if (e.target.closest('.dash-content, .dash-side, [style*="overflowY"], [style*="overflow-y"]')) return;
        if (e.touches.length > 1) return;
      }, { passive: true });
    </script>
  </body>
</html>
